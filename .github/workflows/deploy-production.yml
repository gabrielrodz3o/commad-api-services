name: Promote production
on:
  workflow_dispatch:
    inputs:
      sha:
        description: SHA already deployed and validated in test
        required: true
concurrency: { group: command-api-production, cancel-in-progress: false }
jobs:
  promote:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Promote exact tested image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/command-api/deploy.sh production ghcr.io/${{ github.repository_owner }}/command-api-services:${{ inputs.sha }}
      - run: curl --fail --retry 12 --retry-delay 5 '${{ vars.HEALTH_URL }}/ready'
