name: Deploy test
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [develop]
concurrency: { group: command-api-test, cancel-in-progress: true }
jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    environment: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy immutable image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/command-api/deploy.sh test ghcr.io/${{ github.repository_owner }}/command-api-services:${{ github.event.workflow_run.head_sha }}
      - run: curl --fail --retry 12 --retry-delay 5 '${{ vars.HEALTH_URL }}/ready'
