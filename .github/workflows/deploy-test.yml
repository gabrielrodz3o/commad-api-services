name: Deploy test
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [develop]
concurrency: { group: command-api-test, cancel-in-progress: true }
jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    environment: test
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Watchtower to deploy
        run: sleep 60
      - name: Health check
        run: curl --fail --retry 12 --retry-delay 10 '${{ vars.HEALTH_URL }}/ready'

