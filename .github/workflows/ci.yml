name: CI
on:
  pull_request:
  push:
    branches: [main, develop]
permissions:
  contents: read
  packages: write
jobs:
  validate-build:
    runs-on: ubuntu-latest
    env:
      COMANDI_SERVICE_TOKEN: mock_token_for_ci
      DB_HOST: localhost
      DB_DATABASE: gcode_test
      DB_USER: postgres
      DB_PASSWORD: password
      APP_ENV: test
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with: { registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}' }
      - id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/command-api-services:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - id: branch-tag
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/command-api-services:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/command-api-services:test" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.branch-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
