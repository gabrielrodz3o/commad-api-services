services:
  comandi:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: comandi
    restart: unless-stopped
    networks:
      - app-network
    # Variables (token, llaves, DB) — completa este archivo en el servidor.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4080
      # Dentro de la red, Postgres se alcanza por pgbouncer (igual que el core).
      DB_HOST: pgbouncer
      DB_PORT: 6432
    ports:
      # Local: expone 4080. En producción Nuxt apunta a https://services.comandpos.com
      # (reverse-proxy → este contenedor por la red app-network).
      - "4080:4080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  app-network:
    external: true
    name: app-network
